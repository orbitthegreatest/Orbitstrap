name: Release

on:
  push:
    tags:
      - "v*.*.*"   # triggers on tags like v1.0.0, v1.2.3, etc.

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish single-file exe
        run: |
          dotnet publish Orbitstrap.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true `
            /p:PublishReadyToRun=true `
            -o publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Orbitstrap ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: publish/Orbitstrap.exe
          body: |
            ## Orbitstrap ${{ github.ref_name }}

            Download **Orbitstrap.exe** below and run it — no install needed.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
